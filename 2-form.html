<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form</title>
  <script type="module" crossorigin src="/goit-advancedjs-hw-01/2-form.js"></script>
  <link rel="modulepreload" crossorigin href="/goit-advancedjs-hw-01/assets/modulepreload-polyfill-B5Qt9EMX.js">
  <link rel="stylesheet" crossorigin href="/goit-advancedjs-hw-01/assets/styles-Bw0yDTB0.css">
</head>
<body>
    <header class="page-header">
        <a class="page-button" href="./index.html">Go back
        </a>
    </header> 
    <main>
        <div class="form-container">
            <form class="feedback-form" autocomplete="off">
                <label class="email-label">
                    Email
                    <input class="email-input" type="email" name="email" autofocus />
                </label>
                <label class="textarea-label">
                    Message
                    <textarea class="textarea" name="message" rows="8"></textarea>
                </label>
                <button class="btn-form" type="submit">Submit</button>
            </form>
        </div>    
    </main>
</body>
</html>
